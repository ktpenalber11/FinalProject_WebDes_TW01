<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>LalaChe-Contact</title>
    <link rel="icon" type="image/png" href="LOGO.png">
</head>
<body>
<nav>
    <h1 id="nav_logo"><a href="index.html">LalaChe</a></h1>
    <button class="menu-toggle" id="menuToggle">☰</button>

    <ul id="navLinks">
        <li><a href="index.html"><i class="bi bi-house"></i>Home</a></li>
        <li><a href="quiz.html"><i class="bi bi-stars"></i>Find Your Style</a></li>
        <li><a href="shop.html"><i class="bi bi-bag"></i>Shop</a></li>
        <li><a class="active" href="contact.html"><i class="bi bi-telephone-fill"></i>Contact Us</a></li>
    </ul>
</nav>

    <section class="contact-sec">
        <div class="contact-form">
            <h1>Contact Form</h1>
                <form id="contactForm">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Your name..." required>
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Your email..." required>
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" placeholder="Write your message here..." required></textarea>
                    <input type="submit" value="Send Message">
                </form>
        </div>
    </section>

    <footer class="site-footer">
    <div class="footer-content">
        <h2 class="footer-logo">LalaChe</h2>
        <p class="footer-text">Find your style. Express your identity.</p>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="quiz.html">Quiz</a>
            <a href="shop.html">Shop</a>
            <a href="contact.html">Contact</a>
        </div>
        <p class="footer-bottom">© 2026 LalaChe. All rights reserved.</p>
    </div>
</footer>
    <script src="script.js"></script>
</body>
</html>
